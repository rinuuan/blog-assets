<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Warm-dark vertical gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#131315"/>
    </linearGradient>
    <!-- Mask carving the smoke-curl gap out of the eave -->
    <mask id="smoke-cut">
      <rect fill="white" width="100" height="100"/>
      <path d="M 33,68 C 33,50 50,55 55,30" fill="none" stroke="black" stroke-linecap="round" stroke-width="7"/>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Hairline frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#2a2a2c" stroke-width="1"/>

  <!-- Logo on the left, ~220px tall -->
  <g transform="translate(150, 230) scale(2.2)">
    <circle cx="78" cy="25" r="14" fill="#d97762"/>
    <path d="M 5,50 C 35,50 65,40 95,20 C 85,40 55,45 5,55 Z"
          fill="#dcdcdc" mask="url(#smoke-cut)"/>
    <path d="M 15,75 A 18,18 0 0,0 51,75 Z" fill="#dcdcdc"/>
    <path d="M 33,68 C 33,50 50,55 55,30"
          fill="none" stroke="#a0c184" stroke-linecap="round" stroke-width="3"/>
  </g>

  <!-- Chinese title — right-aligned, two lines -->
  <text x="1080" y="290"
        font-family="'Noto Serif CJK SC', 'Songti SC', 'Source Han Serif CN', 'STSong', serif"
        font-size="72"
        font-weight="500"
        fill="#dcdcdc"
        text-anchor="end"
        letter-spacing="3">檐角日暖，</text>
  <text x="1080" y="375"
        font-family="'Noto Serif CJK SC', 'Songti SC', 'Source Han Serif CN', 'STSong', serif"
        font-size="72"
        font-weight="500"
        fill="#dcdcdc"
        text-anchor="end"
        letter-spacing="3">煮沸一壶人间清欢</text>

  <!-- Sage line accent, right-aligned -->
  <line x1="1010" y1="425" x2="1080" y2="425"
        stroke="#a0c184" stroke-width="2" stroke-linecap="round"/>

  <!-- English subtitle, italic, right-aligned -->
  <text x="1080" y="480"
        font-family="'EB Garamond', 'Cormorant Garamond', 'Crimson Pro', Georgia, serif"
        font-size="28"
        font-style="italic"
        font-weight="400"
        fill="#8a8a8a"
        text-anchor="end">Sun-warmed eaves, a pot of simple joys</text>

  <!-- Domain, right-aligned, tracked-out -->
  <text x="1080" y="555"
        font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="13"
        font-weight="400"
        fill="#5a5a5c"
        text-anchor="end"
        letter-spacing="8">RINUAN.ORG</text>
</svg>
